<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RE-CICLE - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-page">
    <article class="auth-card">
      <header class="logo">
        <img src="images/navbar.png" alt="RE-CICLE">
      </header>

      <h2>Entrar</h2>
      <p class="subtitle">Acesse sua conta para continuar</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="login">Usuário</label>
          <input type="text" id="login" class="form-input" placeholder="Seu usuário" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" class="form-input" placeholder="Sua senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
      </form>

      <footer class="auth-footer">
        <div class="auth-divider">ou</div>
        <p class="subtitle"><a href="registro.html">Criar uma conta</a></p>
        <p class="subtitle"><a href="recuperacao-senha.html">Esqueci minha senha</a></p>
      </footer>
    </article>
  </main>

  <script src="login.js"></script>
  <script>
    document.getElementById('loginForm')?.addEventListener('submit', function(e) {
      e.preventDefault();
      fazerLogin();
    });
  </script>
</body>
</html>
