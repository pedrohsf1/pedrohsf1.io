<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RE-CICLE - Cadastro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-page">
    <article class="auth-card wide">
      <header class="logo">
        <img src="images/navbar.png" alt="RE-CICLE">
      </header>

      <h2>Criar Conta</h2>
      <p class="subtitle">Cadastre-se na plataforma RE-CICLE</p>

      <form id="registerForm">
        <div class="titulo-secao-form">Dados do Usuário</div>

        <div class="form-group">
          <label for="nomeRep">Nome completo</label>
          <input type="text" id="nomeRep" class="form-input" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label for="usuarioRep">Nome de usuário</label>
          <input type="text" id="usuarioRep" class="form-input" placeholder="Ex: joaosilva" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="emailRep">E-mail</label>
          <input type="email" id="emailRep" class="form-input" placeholder="seu@email.com">
        </div>

        <div class="titulo-secao-form">Segurança</div>

        <div class="form-row">
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" class="form-input" placeholder="Crie uma senha" required>
          </div>
          <div class="form-group">
            <label for="confirmarSenha">Confirmar Senha</label>
            <input type="password" id="confirmarSenha" class="form-input" placeholder="Confirme a senha" required>
          </div>
        </div>

        <div class="titulo-secao-form">Perfil</div>
        <p style="font-size:0.85rem; color:var(--text-light); margin-bottom:16px;">Escolha o perfil que melhor descreve sua atuação:</p>

        <div class="form-row">
          <div class="form-group">
            <label class="perfil-option" for="perfilTutor">
              <input type="radio" name="perfil" id="perfilTutor" value="tutor" checked>
              <div>
                <strong>Tutor</strong>
                <span>Professor / educador ambiental</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="perfil-option" for="perfilCandidato">
              <input type="radio" name="perfil" id="perfilCandidato" value="candidato">
              <div>
                <strong>Candidato</strong>
                <span>Cidadão / voluntário</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="perfil-option" for="perfilOng">
              <input type="radio" name="perfil" id="perfilOng" value="ong">
              <div>
                <strong>ONG</strong>
                <span>Organização não governamental</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <label class="perfil-option" for="perfilPrefeitura">
              <input type="radio" name="perfil" id="perfilPrefeitura" value="prefeitura">
              <div>
                <strong>Prefeitura</strong>
                <span>Órgão público municipal</span>
              </div>
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Criar Conta</button>
      </form>

      <footer class="auth-footer mt-3">
        <p class="subtitle">
          Já tem conta? <a href="index.html">Faça login</a>
        </p>
      </footer>
    </article>
  </main>

  <script>
    var usuariosFixos = {
      tutor:      { senha: "123456",   papel: "tutor",      nome: "Tutor" },
      candidato:  { senha: "cand!098", papel: "candidato",  nome: "Candidato" },
      Ong:        { senha: "ong$-135", papel: "ong",        nome: "ONG" },
      prefeitura: { senha: "pref@456", papel: "prefeitura", nome: "Prefeitura" },
    };

    document.getElementById('registerForm')?.addEventListener('submit', function(e) {
      e.preventDefault();

      const nome = document.getElementById('nomeRep').value.trim();
      const usuario = document.getElementById('usuarioRep').value.trim().toLowerCase();
      const email = document.getElementById('emailRep').value.trim();
      const senha = document.getElementById('senha').value;
      const confirmarSenha = document.getElementById('confirmarSenha').value;
      const perfil = document.querySelector('input[name="perfil"]:checked').value;

      if (!nome) {
        alert('Informe seu nome');
        return;
      }

      if (!usuario) {
        alert('Escolha um nome de usuário');
        return;
      }

      if (senha !== confirmarSenha) {
        alert('As senhas não coincidem');
        return;
      }

      if (usuariosFixos[usuario]) {
        alert('Este nome de usuário já existe como conta fixa');
        return;
      }

      const dados = JSON.parse(localStorage.getItem("usuariosCadastrados") || "{}");

      if (dados[usuario]) {
        alert('Nome de usuário já cadastrado');
        return;
      }

      dados[usuario] = { nome, email, senha, papel: perfil };
      localStorage.setItem("usuariosCadastrados", JSON.stringify(dados));

      alert('Conta criada com sucesso! Faça login para continuar.');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
