<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RE-CICLE - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="p-gina-principal.html" class="logo">
        <img src="images/navbar.png" alt="RE-CICLE">
      </a>
      <h2>Entrar</h2>
      <p class="subtitle">Acesse sua conta para continuar</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="login">Login</label>
          <input type="text" id="login" class="form-input" placeholder="Seu login ou e-mail" required>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" class="form-input" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
      </form>

      <div class="auth-divider">ou</div>

      <p class="subtitle">
        <a href="registro.html">Criar uma conta</a>
      </p>
      <p class="subtitle">
        <a href="recuperacao-senha.html">Esqueci minha senha</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm')?.addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Login realizado com sucesso!');
      window.location.href = 'p-gina-principal.html';
    });
  </script>
</body>
</html>
